name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
        build_type: [Debug, Release]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 g++-13 cmake ninja-build libcurl4-openssl-dev

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DIBEX_WARNINGS_AS_ERRORS=ON \
            -DIBEX_ENABLE_SANITIZERS=${{ matrix.build_type == 'Debug' && 'ON' || 'OFF' }} \
            -DIBEX_BUILD_TESTS=ON \
            -DIBEX_BUILD_TOOLS=ON
      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DIBEX_WARNINGS_AS_ERRORS=ON \
            -DIBEX_ENABLE_SANITIZERS=${{ matrix.build_type == 'Debug' && 'ON' || 'OFF' }} \
            -DIBEX_BUILD_TESTS=ON \
            -DIBEX_BUILD_TOOLS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: |
          # Everything except the known wall-clock-timing flake, fail-fast.
          ctest --test-dir build --output-on-failure --parallel 4 \
            -E '^StreamBuffered feeds a TimeBucket stream from a producer thread$'
          # The StreamBuffered producer-thread test is a macOS timing race, not
          # a logic bug — retry just it so a transient miss doesn't fail CI.
          ctest --test-dir build --output-on-failure \
            -R '^StreamBuffered feeds a TimeBucket stream from a producer thread$' \
            --repeat until-pass:3

  build-and-test-windows:
    strategy:
      matrix:
        build_type: [Debug, Release]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      # libcurl powers HTTPS read_csv. Use the static-md triplet so curl links
      # statically into the csv plugin (no libcurl.dll to put on PATH for the
      # tests) while the CRT stays dynamic (/MD), matching the rest of the build.
      # The default ssl feature resolves to Schannel here, so no OpenSSL build.
      - name: Install libcurl (vcpkg)
        run: vcpkg install curl:x64-windows-static-md

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DIBEX_WARNINGS_AS_ERRORS=ON `
            -DIBEX_BUILD_TESTS=ON `
            -DIBEX_BUILD_TOOLS=ON `
            -DIBEX_BUILD_PYTHON_BRIDGE=OFF `
            -DIBEX_BUILD_PARQUET=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: |
          chcp 65001
          ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure --parallel 4 `
            -E '^StreamBuffered feeds a TimeBucket stream from a producer thread$'
          ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure `
            -R '^StreamBuffered feeds a TimeBucket stream from a producer thread$' `
            --repeat until-pass:3

  # LLVM Clang with -Werror — the regular legs use g++ (Linux), AppleClang
  # (macOS) and MSVC (Windows), so clang-specific -Werror issues used to
  # surface only in the release build (clang-18). This mirrors that toolchain
  # and config so they're caught on PRs instead. Build-only (incl. tests):
  # compiling under -Werror is the point; runtime is covered by the other legs.
  clang-werror:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 cmake ninja-build libcurl4-openssl-dev

      - name: Configure (mirrors the release toolchain)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DIBEX_WARNINGS_AS_ERRORS=ON \
            -DIBEX_ENABLE_MARCH_NATIVE=OFF \
            -DIBEX_BUILD_TESTS=ON \
            -DIBEX_BUILD_TOOLS=ON \
            -DIBEX_BUILD_PYTHON_BRIDGE=OFF \
            -DIBEX_BUILD_PARQUET=OFF

      - name: Build (everything incl. tests, under -Werror)
        run: cmake --build build --parallel

      # Structural fusion guard. This is the only Release build on a PR, and the
      # invariant only holds with optimization on (in Debug the per-element
      # overhead swamps the O(n log k) vs O(n log n) gap), so it lives here. The
      # check asserts ratios between related cases (fused vs un-fused baseline),
      # which cancel hosted-runner speed — a failure means a fusion stopped
      # firing (e.g. canonicalize R16 regressed), not a perf wobble. Unlike
      # perf-stats.yml, this one *gates*, because it guards correctness of
      # operator selection, not a tuning target.
      - name: Fusion invariants
        run: ./build/tools/ibex_fusion_bench --check --rows 500000 --iters 3 --warmup 1

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-20 clang-tidy-20 cmake ninja-build libcurl4-openssl-dev || \
          sudo apt-get install -y clang-18 clang-tidy-18 cmake ninja-build libcurl4-openssl-dev

      - name: Configure (also emits compile_commands.json)
        # Ninja + CMAKE_EXPORT_COMPILE_COMMANDS (set in CMakeLists) writes
        # compile_commands.json at configure time, and FetchContent populates
        # the header-only deps (fmt/spdlog/robin_hood) here too — so no build
        # is needed before clang-tidy. We only tidy our own src/*.cpp, which
        # don't depend on any build-time-generated headers.
        run: |
          if command -v clang++-20 >/dev/null 2>&1; then CC=clang-20; CXX=clang++-20; else CC=clang-18; CXX=clang++-18; fi
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX

      - name: Run clang-tidy
        run: |
          if command -v clang-tidy-20 >/dev/null 2>&1; then TIDY=clang-tidy-20; else TIDY=clang-tidy-18; fi
          # Run one clang-tidy process per core. Analyze only our .cpp TUs;
          # headers are covered transitively via the TUs that include them, so
          # tidying *.hpp standalone is redundant (and was a big chunk of the
          # runtime). -n1 so each file is its own job for -P to parallelize.
          find src -name '*.cpp' -print0 | \
            xargs -0 -P "$(nproc)" -n1 "$TIDY" -p build

  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-20 || sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find src include tests tools -name '*.cpp' -o -name '*.hpp' | \
            xargs ./scripts/clang-format.sh --dry-run --Werror

      - name: Check bundled I/O examples use imports
        run: ./scripts/check-bundled-io-imports.sh
