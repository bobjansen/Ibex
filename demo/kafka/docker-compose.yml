services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --set
      - redpanda.auto_create_topics_enabled=true
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
    ports:
      - "19092:19092"
      - "18082:18082"
      - "19644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  tick-producer:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.4
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/demo/producer.sh"]
    environment:
      BROKERS: redpanda:9092
      TOPIC: ticks
      TICKS_PER_BATCH: "8"
      SLEEP_SECONDS: "0.20"
    volumes:
      - ./producer.sh:/demo/producer.sh:ro

